<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" >
    
    <!-- css -->
    <link rel="stylesheet" href="css/style.css">
    <title>Miet - Estude pela Rede Social</title>
</head>
<body>
    <!-- balls BG -->
    <div class="balls">
        <div class="ball"></div>
        <div class="ball"></div>
    </div>
    
    <main class="login_container">
        <header class="login_header">
            <div class="neon_title">
            </div>
            <h1 class="login_title">miet</h1>
            <h4 class="login_subtitle">Estude pela Rede Social</h4>
        </header>
        <section class="login_box">
            <!-- Fromulário -->
            <form class="login_form" action="#" method="post">
                <h2>Dados Cadastrais</h2>
                <div class="field">
                    <label for="nome">Email</label>
                    <input type="text" id="email" name="email" placeholder="usuario@email.com.br" required>
                </div>
                
                <div class="field">
                    <div class="field_password">
                        <label for="senha">Senha</label>
                        <a href="#">Esqueceu sua senha?</a>
                    </div>
                    <input type="password" id="senha" name="senha" required>
                </div>
                
                <button class="login_btn" type="submit">Entrar ></button>
            </form>
            
            <div class="login_footer">
                <div class="divisor">
                    <p>ou acesse com</p>
                </div>

                <figure class="acess_gmail">
                    <img src="assets/icons/gmail.png" alt="link para conexão via Gmail">
                </figure>
            </div>
        </section>
        <h4>Não é cadastrado? <span><a href="pages/cadastro.html">Cadastre - se</a></span></h4>
    </main>
    
</body>
</html>
