<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="../css/feed.css">
    <title>ShareMind - Estude pela Rede Social</title>
</head>
<body>

    <!-- HEADER -->
    <header class="header_container">
        <div class="upBar">
            <div class="header_logo">
                <h1>Share<br>Mind</h1>
            </div>
            <div class="header_search">
                <input type="text" placeholder="Buscar...">
            </div>
            <div class="header_notifIcon">
                <img src="../assets/icons/notificationIconWhite.png" alt="botao de notificaçoes" class="notif_img">
            </div>
            <div class="header_configIcon">
                <img src="../assets/icons/settingsIconWhite.png" alt="">
            </div>
            <div class="header_user_avatar">
                <img src="../assets/img/fotoPerfilPauloFischer.png" alt="foto avatar usuario profile">
            </div>
        </div>

<!-- =====================================================================================
                                        STORIES - FEED
========================================================================================-->
        <div class="stories" id="storiesContainer"></div>
        <div id="storyViewer" class="hidden">
            <img id="storyImg">
        </div>
    </header>
    
<!-- ======================================================================================
                                        POSTS - FEED
======================================================================================== -->
    <div id="feed"></div>

<!-- ======================================================================================
                                        FOOTER - FEED
========================================================================================-->
    <footer>
        <div class="funcItem">
            <img src="../assets/icons/notificationIconWhite.png" alt="">
            <img src="../assets/icons/ai-brain2.png" alt="">
            <img src="../assets/icons/ai-technology.png" alt="">
            <img src="../assets/icons/magic.png" alt="">
        </div>
    </footer>


    <script src="../js/feed.js"></script>
</body>
</html>
